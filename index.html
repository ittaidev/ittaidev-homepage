<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Página web de Ittai Rivero">
  <meta name="author" content="ittaidev">
  <link rel="icon" href="me.png" type="image/png">
  <meta property="og:title" content="Ittai Rivero | IT Support Specialist">
  <meta property="og:image" content="https://ittai.dev/me.webp">
  <title>Ittai Rivero</title>

  <!-- Fuentes y estilos base -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/c9ff70076a.js" crossorigin="ittaidev"></script>

  <style>
    /* Reset y estilos globales */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f7f7f7;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* Contenedor principal - estilo minimalista y centrado */
    .portfolio-container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    /* Imagen de perfil */
    .profile-image {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      object-fit: cover;
      margin: 20px auto 30px;
      display: block;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-image:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
    }

    /* Títulos principales */
    h1 {
      font-size: 54px;
      font-weight: 100;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      margin: 0 auto;
    }

    .subtitle {
      font-size: 25px;
      font-weight: 300;
      color: #4a4a4a;
      margin: 10px auto 30px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 20px;
      display: inline-block;
    }

    /* Texto de bienvenida */
    .bio {
      font-size: 18px;
      font-weight: 300;
      line-height: 1.6;
      color: #2d2d2d;
      max-width: 600px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    /* Iconos sociales */
    .social-links {
      margin: 25px auto 40px;
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .social-icon {
      width: 55px;
      height: 55px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      color: #4a4a4a;
      font-size: 28px;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-decoration: none;
      filter: grayscale(100%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    /* Efecto hover: colores originales + elevación */
    .social-icon:hover {
      filter: grayscale(0%);
      transform: translateY(-5px);
      background: white;
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
    }

    /* Colores específicos al hover */
    .social-icon.linkedin:hover {
      color: #0077b5;
    }

    .social-icon.github:hover {
      color: #333333;
    }

    .social-icon.x:hover {
      color: #000000;
    }

    /* Línea decorativa */
    .divider {
      width: 60px;
      height: 2px;
      background: #d0d0d0;
      margin: 15px auto;
      border-radius: 2px;
    }

    /* Footer */
    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #8a8a8a;
      font-weight: 300;
    }

    /* Animación de entrada */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive para móviles */
    @media (max-width: 768px) {
      body {
        padding: 1.5rem;
      }

      h1 {
        font-size: 11vw;
      }

      .subtitle {
        font-size: 5vw;
        margin-bottom: 20px;
      }

      .profile-image {
        width: 180px;
        height: 180px;
        margin: 10px auto 20px;
      }

      .bio {
        font-size: 16px;
        padding: 0 15px;
      }

      .social-icon {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }
    }

    @media (max-width: 480px) {
      .social-links {
        gap: 18px;
      }
      
      .social-icon {
        width: 44px;
        height: 44px;
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="portfolio-container">
    <img src="me.webp" 
         alt="Foto de perfil" 
         class="profile-image"
         id="profile-photo">
    
    <h1>Ittai Rivero</h1>
    <div class="subtitle">IT Support Specialist | Graduado en ASIR</div>
    <div class="divider"></div>
    
    <!-- <div class="bio">
  
    </div> -->

    <!-- Iconos sociales -->
    <div class="social-links">
      <a href="https://linkedin.com/in/ittairivero" 
         target="_blank" 
         rel="noopener noreferrer"
         class="social-icon linkedin"
         aria-label="LinkedIn">
        <i class="fab fa-linkedin-in"></i>
      </a>
      
      <a href="https://github.com/ittaidev" 
         target="_blank" 
         rel="noopener noreferrer"
         class="social-icon github"
         aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a> 
      
      <a href="https://x.com/ittaidev" 
         target="_blank" 
         rel="noopener noreferrer"
         class="social-icon x"
         aria-label="X (Twitter)">
        <i class="fab fa-x-twitter"></i>
      </a>
    </div>

    <!-- <footer>
      <p></p>
    </footer> -->
  </div>
</body>
</html>
